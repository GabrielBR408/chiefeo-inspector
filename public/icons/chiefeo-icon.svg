<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- ChiefEO app icon — bars-only mark (no wordmark). Navy tile with three
       ascending blue bars and a white stepped "rising" line over their tops. -->
  <rect width="512" height="512" rx="104" fill="#26384c"/>
  <!-- Ascending bars (light → dark), rounded corners, common baseline. -->
  <rect x="84"  y="280" width="96" height="150" rx="20" fill="#7da9ce"/>
  <rect x="208" y="200" width="96" height="230" rx="20" fill="#3f7aae"/>
  <rect x="332" y="120" width="96" height="310" rx="20" fill="#2e5d84"/>
  <!-- White stepped line tracing the bar tops, rounded caps/joins. -->
  <path d="M64 280 L196 280 L196 200 L320 200 L320 120 L448 120"
        fill="none" stroke="#ffffff" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
